name: Build APK

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Find debug APK
        id: find_apk
        shell: bash
        run: |
          set -euo pipefail

          apk_path="$(find . -type f -path '*/build/outputs/apk/debug/*.apk' ! -name '*androidTest*' | sort | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "No debug APK found under */build/outputs/apk/debug/." >&2
            exit 1
          fi

          echo "Found debug APK: ${apk_path}"
          echo "apk_path=${apk_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14
